name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (non-live tests only)
        working-directory: ./backend
        env:
          ZAI_API_KEY: ""    # intentionally empty — live tests are skipped in CI
        run: pytest -v

      - name: Synthetic data generator smoke check
        working-directory: ./backend
        run: python data/synthetic_generator.py
